<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Requirement</title>
<link rel="stylesheet" href="assets/styles.css?v=28">
<style>
  .rq-grp { border:1px solid var(--gray-200); border-left:3px solid var(--c-link); border-radius:0 10px 10px 0; background:#fff; padding:16px 18px; }
  .rq-grp--nested { border-left-color:#B0741A; background:#FAF7F0; margin-top:12px; }
  .rq-item { border:1px solid var(--gray-200); border-left:3px solid #B0741A; border-radius:8px; padding:14px; background:#fff; margin-bottom:12px; }
  .rq-item__top { display:flex; align-items:center; gap:10px; }
  .rq-item__top .select { flex:1; }
  .rq-tag { display:inline-block; font-size:10px; letter-spacing:.06em; text-transform:uppercase; font-weight:700; color:#9c6612; background:#F3E7CF; border-radius:5px; padding:2px 7px; margin-bottom:8px; }
  .rq-fields { display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; margin-top:12px; }
  .rq-fields .field { margin:0; }
  .rq-row3 { display:grid; grid-template-columns:160px 160px 1fr; gap:12px 16px; margin-top:12px; }
  @media (max-width:760px){ .rq-fields, .rq-row3 { grid-template-columns:1fr; } }
  .rq-acts { display:flex; gap:6px; flex:none; }
  .rq-opbar { display:flex; align-items:center; gap:22px 28px; margin-top:6px; padding-top:14px; border-top:1px solid var(--gray-200); flex-wrap:wrap; }
  .rq-op { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .rq-op__sel { width:240px; }
  .rq-op span { font-size:12px; color:#576773; }
  .rq-addlinks { display:flex; align-items:center; gap:22px; }
  .rq-min { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .rq-min label { font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:#9aa3ad; display:flex; align-items:center; gap:6px; }
  .rq-min .select { width:62px; }
  label.mini { display:block; font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:#9aa3ad; margin-bottom:5px; }
</style>
</head>
<body>
<div class="app" id="app">
  <main>
    <div class="page">
      <button class="back-link" onclick="go('program-detail.html')"><span class="chev-left"></span> Back</button>
      <h1 class="h1" style="margin-top:12px;">Add Requirement</h1>
      <p class="lead">Define the academic requirement students must fulfill to complete this program.</p>

      <!-- REQUIREMENT DETAILS -->
      <div class="card">
        <h2 class="card-title">Requirement Details</h2>
        <div style="display:grid; grid-template-columns:1fr 220px; gap:18px; margin-top:16px; align-items:end;">
          <div class="field" style="margin:0;"><label>Name</label><input class="input" id="rName" placeholder="e.g. Lower-division core"></div>
          <div class="field" style="margin:0;">
            <label>Credits Range</label>
            <div style="display:flex; align-items:center; gap:8px;">
              <input class="input" id="rMin" style="width:80px;" value="0"><span class="muted">–</span><input class="input" id="rMax" style="width:80px;" value="0">
            </div>
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr auto; gap:18px; margin-top:14px; align-items:end;">
          <div class="field" style="margin:0;"><label>Default Subheading Text</label><input class="input" id="rSub" placeholder="Subheading shown to students"></div>
          <label class="ccs-check" style="margin-bottom:10px;"><input type="checkbox" id="rOverride"><span class="box"><svg viewBox="0 0 12 12" fill="none"><path d="M1 6l3.5 3.5L11 2.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="lbl">Override Default Subheading</span></label>
        </div>
        <label class="ccs-check" style="margin-top:14px;">
          <input type="checkbox" id="rHome">
          <span class="box"><svg viewBox="0 0 12 12" fill="none"><path d="M1 6l3.5 3.5L11 2.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="lbl">Home Institution Only<span class="sub">This entire requirement section must be completed at the student's home institution.</span></span>
        </label>
      </div>

      <!-- REQUIREMENT DEFINITION -->
      <div class="card">
        <div class="reqdef-head">
          <div><h2 class="card-title" style="margin:0;">Requirement Definition</h2><p class="card-sub" style="margin:4px 0 0;">Add components and combine them with AND/OR. Courses live on each component — managed in the Components tab.</p></div>
          <div class="reqdef-head__actions">
            <button class="btn btn-outline btn-md" onclick="openPreview()"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:5px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Preview Requirement</button>
          </div>
        </div>
        <div id="def" style="margin-top:18px;"></div>
      </div>

      <div class="card-actions">
        <button class="btn btn-outline btn-md" onclick="go('program-detail.html')">Cancel</button>
        <button class="btn btn-primary btn-md" onclick="save()">Save</button>
      </div>
    </div>
  </main>
</div>

<!-- preview modal -->
<div class="tray-overlay" id="pv">
  <div class="tray" role="dialog" aria-modal="true" aria-labelledby="pvTitle">
    <div class="tray-head"><h3 id="pvTitle">Preview requirement</h3><button class="tray-close" onclick="closePreview()" aria-label="Close">&times;</button></div>
    <div class="tray-body" id="pvBody"></div>
    <div class="tray-foot"><button class="btn btn-primary btn-md" onclick="closePreview()">Done</button></div>
  </div>
</div>

<script src="assets/app.js?v=28"></script>
<script>
mountChrome([{label:'Admin', href:'dashboard.html'}, {label:'Regional Collaboratives', href:'collaboratives.html'}, {label:'Southern CA Health Sciences Network', href:'collab-detail.html'}, {label:'Registered Nursing (RN)', href:'program-detail.html'}, {label:'Add Requirement'}]);
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function liveToast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); requestAnimationFrame(()=>t.classList.add('show')); setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2200); }
const TRASH='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

/* component pool (mirrors the Components tab) + sample courses for preview */
const POOL = ['College Composition','Human Anatomy','Introduction to Psychology','Medical Terminology','College Algebra'];
const POOL_COURSES = {
  'College Composition': ['ENGL 1 — Composition (UCLA)','ENGL 100 — College Writing (USC)','ENGWR 101 — Composition (UC San Diego)'],
  'Human Anatomy': ['BIOL 6A — Human Anatomy (UCLA)','BISC 240 — Anatomy (USC)'],
  'Introduction to Psychology': ['PSYCH 10 — Introductory Psychology (UCLA)','PSYC 100 — Introduction to Psychology (USC)','Exclusive — take one: PSYC 1 / PSYC 1H (UC San Diego)'],
  'Medical Terminology': ['HLTH 50 — Medical Terminology (USC)','ALDH 110 — Medical Terminology (Cal State Long Beach)'],
  'College Algebra': ['MATH 1 — College Algebra (UCLA)','MATH 108 — Algebra (USC)','MATH 96 — Algebra (UC San Diego)'],
};

/* model: a tree of groups; items are 'component' or nested 'group' */
function newGroup(){ return { kind:'group', op:'AND', minCourses:'', minCredits:'', minSubjects:'', items:[] }; }
function newComponent(){ return { kind:'component', name:'', display:'', notes:'', grade:'', pick:'', exclude:'' }; }
// Seeded as the canonical "Quantitative or behavioral" requirement — a Take-1-of (OR)
// so the Maryland-style Minimum fields are visible. Delete items / switch to AND to explore.
let tree = { kind:'group', op:'OR', minCourses:'1', minCredits:'', minSubjects:'', items:[
  { kind:'component', name:'Introduction to Psychology', display:'', notes:'', grade:'C', pick:'1', exclude:'' },
  { kind:'component', name:'College Algebra', display:'', notes:'', grade:'C', pick:'1', exclude:'' },
] };
function nodeAt(p){ let n=tree; for(const i of p) n=n.items[i]; return n; }

const GRADES = ['','C','B','A'];
function selOpts(arr,v,empty){ return (empty?`<option value="">${empty}</option>`:'')+arr.filter(x=>x!=='').map(o=>`<option${o===v?' selected':''}>${esc(o)}</option>`).join(''); }
function pickOpts(v){ return '<option value="">Any</option>'+[1,2,3,4,5].map(n=>`<option value="${n}"${String(v)===String(n)?' selected':''}>${n}</option>`).join(''); }

function compCard(it,p){
  const ps=JSON.stringify(p);
  return `<div class="rq-item">
    <span class="rq-tag">Component</span>
    <div class="rq-item__top">
      <select class="select" onchange="upd(${ps},'name',this.value)">
        <option value="">Please select one</option>
        ${POOL.map(o=>`<option${o===it.name?' selected':''}>${esc(o)}</option>`).join('')}
      </select>
      <div class="rq-acts"><button class="rd-iconbtn rd-iconbtn--del" aria-label="Remove" onclick="rm(${ps})">${TRASH}</button></div>
    </div>
    <div class="rq-fields">
      <div class="field"><label class="mini">Display title</label><input class="input" value="${esc(it.display)}" oninput="upd(${ps},'display',this.value)" placeholder="Shown to students (optional)"></div>
      <div class="field"><label class="mini">Component notes</label><input class="input" value="${esc(it.notes)}" oninput="upd(${ps},'notes',this.value)" placeholder="Optional"></div>
    </div>
    <div class="rq-row3">
      <div class="field"><label class="mini">Minimum grade</label><select class="select" onchange="upd(${ps},'grade',this.value)">${selOpts(GRADES,it.grade,'No minimum')}</select></div>
      <div class="field"><label class="mini">Pick X courses</label><select class="select" onchange="upd(${ps},'pick',this.value)">${pickOpts(it.pick)}</select></div>
      <div class="field"><label class="mini">Exclude subjects <span class="muted" style="text-transform:none;">(comma separated)</span></label><input class="input" value="${esc(it.exclude)}" oninput="upd(${ps},'exclude',this.value)" placeholder="e.g. BIOL, CHEM"></div>
    </div>
  </div>`;
}
function groupBlock(node,p){
  const ps=JSON.stringify(p);
  const nested=p.length>0;
  const items = node.items.map((it,i)=> it.kind==='group'?groupBlock(it,p.concat(i)):compCard(it,p.concat(i))).join('');
  const body = items || '<p class="b-empty" style="margin:0 0 4px;">Nothing added yet — add a component or a nested requirement below.</p>';
  return `<div class="rq-grp${nested?' rq-grp--nested':''}">
    ${nested?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span class="rq-tag" style="margin:0;">Requirement</span><button class="rd-iconbtn rd-iconbtn--del" aria-label="Remove requirement" onclick="rm(${ps})">${TRASH}</button></div>`:''}
    ${body}
    <div class="rq-opbar">
      <div class="rq-op">
        <select class="select rq-op__sel" onchange="updOp(${ps},this.value)">
          <option value="AND"${node.op==='AND'?' selected':''}>Take the following (AND)</option>
          <option value="OR"${node.op==='OR'?' selected':''}>Take X from the following (OR)</option>
        </select>
        ${node.op==='OR' ? minFields(node,p) : '<span>how these combine</span>'}
      </div>
      <div class="rq-addlinks">
        <button type="button" class="add-link" onclick="add(${ps},'component')"><span class="circ">+</span> Component</button>
        <button type="button" class="add-link" onclick="add(${ps},'group')"><span class="circ">+</span> Requirement</button>
      </div>
    </div>
  </div>`;
}
function render(){ document.getElementById('def').innerHTML = groupBlock(tree,[]); }

function upd(p,k,v){ nodeAt(p)[k]=v; }                 // text/select fields — no re-render (keep focus)
function updOp(p,v){ nodeAt(p).op=v; render(); }       // re-render so the Minimum fields show/hide
function setMin(p,k,v){ nodeAt(p)[k]=v; }
function numOpts(v, arr){ return '<option value="">—</option>' + arr.map(n=>`<option value="${n}"${String(v)===String(n)?' selected':''}>${n}</option>`).join(''); }
/* Maryland "Take X from the following (OR)" — pick how many of the listed items count. */
function minFields(node,p){
  const ps=JSON.stringify(p);
  return `<span class="rq-min">
    <label>Min courses <select class="select" onchange="setMin(${ps},'minCourses',this.value)">${numOpts(node.minCourses,[1,2,3,4,5,6])}</select></label>
    <label>Min credits <select class="select" onchange="setMin(${ps},'minCredits',this.value)">${numOpts(node.minCredits,[1,2,3,4,5,6,8,9,10,12])}</select></label>
    <label>Min subjects <select class="select" onchange="setMin(${ps},'minSubjects',this.value)">${numOpts(node.minSubjects,[1,2,3,4])}</select></label>
  </span>`;
}
function add(p,kind){ nodeAt(p).items.push(kind==='group'?newGroup():newComponent()); render(); }
function rm(p){ const parent=nodeAt(p.slice(0,-1)); parent.items.splice(p[p.length-1],1); render(); }

/* preview: resolve chosen components to their courses */
function opSummary(node){
  if(node.op!=='OR') return 'take all of the following (AND)';
  const bits=[];
  if(node.minCourses) bits.push(node.minCourses+' course'+(node.minCourses>1?'s':''));
  if(node.minCredits) bits.push(node.minCredits+' credits');
  if(node.minSubjects) bits.push(node.minSubjects+' subject'+(node.minSubjects>1?'s':''));
  return bits.length ? ('take '+bits.join(' / ')+' from the following (OR)') : 'take X from the following (OR)';
}
function collect(node, lines, depth){
  const ind = '&nbsp;'.repeat(depth*4);
  node.items.forEach(it=>{
    if(it.kind==='group'){ lines.push(`${ind}↳ <b>${esc(opSummary(it))}</b>`); collect(it, lines, depth+1); }
    else if(it.name){
      const title = it.display || it.name;
      const rule = [ it.pick?`pick ${it.pick}`:'', it.grade?`min grade ${it.grade}`:'' ].filter(Boolean).join(', ');
      lines.push(`${ind}<b>${esc(title)}</b>${rule?` <span class="muted">(${esc(rule)})</span>`:''}`);
      (POOL_COURSES[it.name]||[]).forEach(c=> lines.push(`${ind}&nbsp;&nbsp;&bull; ${esc(c)}`));
    }
  });
}
function openPreview(){
  const lines=[]; collect(tree, lines, 0);
  document.getElementById('pvBody').innerHTML =
    `<p class="tray-sub">How this requirement resolves for students — students <b>${esc(opSummary(tree))}</b>, and each component pulls its campuses' courses.</p>`
    + (lines.length? `<div class="b-note" style="line-height:1.9;">${lines.join('<br>')}</div>` : '<div class="b-note">Add a component to preview.</div>');
  document.getElementById('pv').classList.add('show');
}
function closePreview(){ document.getElementById('pv').classList.remove('show'); }
document.getElementById('pv').addEventListener('click', e=>{ if(e.target.id==='pv') closePreview(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePreview(); });

function save(){ flashToast('Requirement saved'); go('program-detail.html#requirement'); }
render();
// prefill the requirement details to match the seeded example
(function(){ const n=document.getElementById('rName'); if(n&&!n.value) n.value='Quantitative or behavioral';
  const mn=document.getElementById('rMin'), mx=document.getElementById('rMax'); if(mn) mn.value='3'; if(mx) mx.value='4'; })();
</script>
</body>
</html>
